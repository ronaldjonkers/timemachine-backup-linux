<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — TimeMachine Backup</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--bg-panel, #1a1d24); border: 1px solid var(--border, #2a2f3a);
                     border-radius: 10px; padding: 2.5rem; width: 100%; max-width: 380px; text-align: center; }
        .auth-card h1 { font-size: 1.15rem; margin-bottom: 0.4rem; }
        .auth-card p  { color: var(--text-muted, #8b93a3); font-size: 0.85rem; margin-bottom: 1.5rem; }
        .auth-btn { width: 100%; padding: 0.7rem; font-size: 0.95rem; cursor: pointer;
                    background: var(--green, #28a745); color: #fff; border: 0; border-radius: 6px; }
        .auth-btn:disabled { opacity: 0.5; cursor: default; }
        .auth-msg { margin-top: 1rem; font-size: 0.82rem; min-height: 1.2em; }
        .auth-msg.err { color: #dc3545; }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <h1>&#x23F3; TimeMachine Backup</h1>
        <p>Sign in with your passkey</p>
        <button class="auth-btn" id="btn" onclick="doLogin()">&#x1F511; Sign in with passkey</button>
        <div class="auth-msg" id="msg"></div>
    </div>
</div>
<script>
function b64uToBuf(s) {
    s = s.replace(/-/g, '+').replace(/_/g, '/');
    while (s.length % 4) s += '=';
    var bin = atob(s), buf = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf.buffer;
}
function bufToB64u(buf) {
    var bin = '', bytes = new Uint8Array(buf);
    for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function msg(text, isErr) {
    var el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'auth-msg' + (isErr ? ' err' : '');
}

async function doLogin() {
    var btn = document.getElementById('btn');
    btn.disabled = true;
    msg('Waiting for your passkey…');
    try {
        var begin = await fetch('/api/auth/login/begin', {method: 'POST',
            headers: {'Content-Type': 'application/json'}, body: '{}'});
        var data = await begin.json();
        if (!begin.ok) throw new Error(data.error || 'Could not start login');

        var pk = data.options.publicKey;
        pk.challenge = b64uToBuf(pk.challenge);
        (pk.allowCredentials || []).forEach(function(c) { c.id = b64uToBuf(c.id); });

        var cred = await navigator.credentials.get({publicKey: pk});
        var payload = {
            nonce: data.nonce,
            credential: {
                id: cred.id, rawId: bufToB64u(cred.rawId), type: cred.type,
                response: {
                    clientDataJSON: bufToB64u(cred.response.clientDataJSON),
                    authenticatorData: bufToB64u(cred.response.authenticatorData),
                    signature: bufToB64u(cred.response.signature),
                    userHandle: cred.response.userHandle ? bufToB64u(cred.response.userHandle) : null
                }
            }
        };
        var fin = await fetch('/api/auth/login/complete', {method: 'POST',
            headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
        var result = await fin.json();
        if (!fin.ok) throw new Error(result.error || 'Login failed');
        msg('Welcome, ' + result.user.username + '!');
        window.location.href = '/';
    } catch (e) {
        msg(e.message || String(e), true);
        btn.disabled = false;
    }
}

// If passkeys are not active (legacy mode) or already signed in, go straight in
fetch('/api/auth/status').then(function(r) { return r.json(); }).then(function(s) {
    if (s.mode !== 'passkey' || s.authenticated) window.location.href = '/';
}).catch(function() {});
</script>
</body>
</html>
