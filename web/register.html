<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register passkey — TimeMachine Backup</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--bg-panel, #1a1d24); border: 1px solid var(--border, #2a2f3a);
                     border-radius: 10px; padding: 2.5rem; width: 100%; max-width: 400px; text-align: center; }
        .auth-card h1 { font-size: 1.15rem; margin-bottom: 0.4rem; }
        .auth-card p  { color: var(--text-muted, #8b93a3); font-size: 0.85rem; margin-bottom: 1.25rem; }
        .auth-input { width: 100%; padding: 0.6rem; margin-bottom: 1rem; border-radius: 6px;
                      border: 1px solid var(--border, #2a2f3a); background: var(--bg, #12141a);
                      color: var(--text, #e2e6ee); font-size: 0.9rem; }
        .auth-btn { width: 100%; padding: 0.7rem; font-size: 0.95rem; cursor: pointer;
                    background: var(--green, #28a745); color: #fff; border: 0; border-radius: 6px; }
        .auth-btn:disabled { opacity: 0.5; cursor: default; }
        .auth-msg { margin-top: 1rem; font-size: 0.82rem; min-height: 1.2em; }
        .auth-msg.err { color: #dc3545; }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <h1>&#x23F3; TimeMachine Backup</h1>
        <p>Create a passkey for this dashboard.<br>
           You will use it to sign in — no password needed.</p>
        <input class="auth-input" id="keyname" placeholder="Name for this passkey (e.g. 'MacBook', 'iPhone')" maxlength="64">
        <button class="auth-btn" id="btn" onclick="doRegister()">&#x1F511; Create passkey</button>
        <div class="auth-msg" id="msg"></div>
    </div>
</div>
<script>
function b64uToBuf(s) {
    s = s.replace(/-/g, '+').replace(/_/g, '/');
    while (s.length % 4) s += '=';
    var bin = atob(s), buf = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf.buffer;
}
function bufToB64u(buf) {
    var bin = '', bytes = new Uint8Array(buf);
    for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function msg(text, isErr) {
    var el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'auth-msg' + (isErr ? ' err' : '');
}

var token = new URLSearchParams(window.location.search).get('token') || '';
if (!token) msg('Missing registration token — ask your administrator for a new link.', true);

async function doRegister() {
    var btn = document.getElementById('btn');
    btn.disabled = true;
    msg('Follow the prompts of your browser or device…');
    try {
        var begin = await fetch('/api/auth/register/begin', {method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({token: token})});
        var data = await begin.json();
        if (!begin.ok) throw new Error(data.error || 'Could not start registration');

        var pk = data.options.publicKey;
        pk.challenge = b64uToBuf(pk.challenge);
        pk.user.id = b64uToBuf(pk.user.id);
        (pk.excludeCredentials || []).forEach(function(c) { c.id = b64uToBuf(c.id); });

        var cred = await navigator.credentials.create({publicKey: pk});
        var payload = {
            token: token,
            nonce: data.nonce,
            name: document.getElementById('keyname').value || 'passkey',
            credential: {
                id: cred.id, rawId: bufToB64u(cred.rawId), type: cred.type,
                response: {
                    clientDataJSON: bufToB64u(cred.response.clientDataJSON),
                    attestationObject: bufToB64u(cred.response.attestationObject)
                }
            }
        };
        var fin = await fetch('/api/auth/register/complete', {method: 'POST',
            headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
        var result = await fin.json();
        if (!fin.ok) throw new Error(result.error || 'Registration failed');
        msg('Passkey registered for ' + result.user.username + '! Redirecting to sign-in…');
        setTimeout(function() { window.location.href = '/login.html'; }, 1500);
    } catch (e) {
        msg(e.message || String(e), true);
        btn.disabled = false;
    }
}
</script>
</body>
</html>
